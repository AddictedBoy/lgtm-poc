apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-values-poc
  namespace: lgtm-poc
data:
  values.yaml: |
    server:
      http_listen_port: 3200
      grpc_listen_port: 9096
    ingester:
      flush_check_period: 10s
      max_block_duration: 30s
      trace_idle_period: 10s
    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/traces
    metricsGenerator:
      enabled: false
    distributor:
      usage:
        cost_attribution:
          enabled: true
          max_cardinality: 10000
          stale_duration: 15m0s
      receivers:
        jaeger:
          protocols:
            grpc:
              endpoint: 0.0.0.0:14250
            thrift_binary:
              endpoint: 0.0.0.0:6832
            thrift_compact:
              endpoint: 0.0.0.0:6831
            thrift_http:
              endpoint: 0.0.0.0:14268
        zipkin:
          endpoint: 0.0.0.0:9411
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318
    persistence:
      enabled: true
      size: 10Gi
      storageClassName: standard
    service:
      type: NodePort
      nodePort: 30031
    query_frontend:
      search:
        concurrent_jobs: 1000
        max_duration: 30m
      traceql:
        metrics:
          enabled: true
    overrides:
      defaults:
        cost_attribution:
          dimensions:
            service.name: ""