# Grafana Configuration for lgtm-poc
# This file is used by Helm to deploy Grafana with proper datasources

admin:
  user: admin
  password: admin123

featureToggles:
  exploreHints: true

service:
  type: NodePort
  port: 80
  targetPort: 3000
  nodePort: 3000

# Using init container to create provisioning files
initChown:
  enabled: false

persistence:
  enabled: false

# Enable sidecar for dashboards and datasources from ConfigMaps
sidecar:
  datasources:
    enabled: true
    defaultDatasourceEnabled: false
  dashboards:
    enabled: true
    folder: /tmp/dashboards
    searchNamespace: lgtm-poc

# Resources
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi