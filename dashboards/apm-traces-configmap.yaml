            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "textMode": "auto"
          },
          "pluginVersion": "12.3.1",
          "targets": [
            {
              "expr": "sum(rate(tempo_usage_tracker_bytes_received_total[5m])) / sum(rate(tempo_usage_tracker_bytes_received_total[5m]))",
