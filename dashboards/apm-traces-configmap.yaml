          "pluginVersion": "12.3.1",
          "targets": [
            {
              "expr": "sum by (service_name) (rate(tempo_usage_tracker_bytes_received_total[5m]))",
              "legendFormat": "{{service_name}}",
              "refId": "A"
            }
          ],
          "title": "Bytes Received by Service (Cost Attribution)",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "mimir"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 100000000},
                  {"color": "red", "value": 500000000}
                ]
              },
              "unit": "bytes"
            },
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 6, "x": 18, "y": 1},
          "id": 4,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "textMode": "auto"
          },
          "pluginVersion": "12.3.1",
          "targets": [
            {
              "expr": "sum(container_memory_working_set_bytes{namespace=\"lgtm-poc\"})",
              "legendFormat": "Memory Used",
              "refId": "A"
            }
          ],
          "title": "Tempo Memory Usage",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "mimir"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 0.5},
                  {"color": "red", "value": 0.8}
                ]
              },
              "unit": "percentunit"
            },
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 6, "x": 18, "y": 5},
          "id": 5,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "textMode": "auto"
          },
          "pluginVersion": "12.3.1",
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"lgtm-poc\"}[5m]))",
              "legendFormat": "CPU Rate",
              "refId": "A"
            }
          ],
          "title": "Tempo CPU Usage",
          "type": "stat"
        }
